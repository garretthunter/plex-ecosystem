##
# SABnzbd - Usenet download service https://sabnzbd.org/
# Docker Hub: https://hub.docker.com/r/linuxserver/sabnzbd
##  
services:
  sabnzbd:
    container_name: sabnzbd
    image: lscr.io/linuxserver/sabnzbd:latest
    depends_on: 
      - nginx-proxy-manager
#    network_mode: 'host' # Use host networking for better performance
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - ${HOST_MOUNT}/config/sabnzbd:/config
      - ${HOST_MOUNT}/backups/sabnzbd:/backups
      - ${HOST_MOUNT}/data/usenet:/data/usenet
    ports:
      - 8080:8080
    restart: unless-stopped
    networks:
      - proxied
      - media

networks:
  proxied:
    external: true
  media:
    external: true