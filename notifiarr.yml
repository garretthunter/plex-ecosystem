##
# Notifiarr - Client of Notifiarr.com notification service https://notifiarr.com/
# Docker Hub: https://hub.docker.com/r/golift/notifiarr
##  
services:
  notifiarr:
    container_name: notifiarr
    image: golift/notifiarr:latest

#    network_mode: 'host' # Use host networking for better performance
    hostname: notifiarr-${HOSTNAME}
    depends_on:
      plex:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    restart: unless-stopped 
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - DN_API_KEY=${NOTIFIARR_API_KEY}
    volumes:
      - ${HOST_MOUNT}/config/notifiarr:/config
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id
    ports:
      - 5454:5454
    networks:
      - media
      - proxied

networks:
  media:
  proxied:
    external: true
    name: proxied

